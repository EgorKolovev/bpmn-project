---
# Создание директории приложения с правами для deploy-пользователя
- name: Setup app directory
  hosts: deploy_hosts
  become: true

  tasks:
    - name: Create app directory
      ansible.builtin.file:
        path: /opt/bpmn-project
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'
