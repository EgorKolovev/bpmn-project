services:
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-bpmn}:${POSTGRES_PASSWORD:-bpmn}@db:5432/${POSTGRES_DB:-bpmn}
      - ML_SERVICE_URL=http://ml:8001
      - SESSION_SECRET_FILE=/data/session_secret.txt
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1,http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}
    depends_on:
      db:
        condition: service_healthy
      ml:
        condition: service_started
    volumes:
      - backend_data:/data
    restart: unless-stopped

  ml:
    build: ./ml
    expose:
      - "8001"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-3.1-flash-lite-preview}
      - DAILY_SPEND_LIMIT_USD=${DAILY_SPEND_LIMIT_USD:-5.0}
      - USAGE_DB_PATH=/data/usage.sqlite3
    volumes:
      - ml_data:/data
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-bpmn}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-bpmn}
      - POSTGRES_DB=${POSTGRES_DB:-bpmn}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bpmn}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  backend_data:
  ml_data:
  pgdata:
