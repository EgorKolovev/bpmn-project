# Minimal single-binary Loki config — suitable for one-host docker compose
# deployments. Storage in a local volume, no auth, no ring/clustering.
# For multi-host or production-grade ingest, swap in the Helm chart.

auth_enabled: false

server:
  http_listen_port: 3100
  log_level: warn

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

ruler:
  alertmanager_url: ""

limits_config:
  retention_period: 720h  # 30 days
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  max_query_lookback: 720h
  allow_structured_metadata: false

compactor:
  working_directory: /loki/compactor
  delete_request_store: filesystem

analytics:
  reporting_enabled: false
