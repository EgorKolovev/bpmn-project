# Promtail tails Docker container stdout/stderr via the Docker socket
# and ships log lines to Loki. We only scrape containers explicitly
# labelled `logging=promtail` (set on backend + ml in docker-compose).

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["logging=promtail"]
    relabel_configs:
      - source_labels: ["__meta_docker_container_label_logging_jobname"]
        target_label: job
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      # If app logs are JSON, parse them so structured fields become
      # log labels / extracted query targets inside Grafana.
    pipeline_stages:
      - json:
          expressions:
            level: level
            logger: logger
            event: event
            timestamp: timestamp
      - labels:
          level:
          logger:
      - timestamp:
          source: timestamp
          format: RFC3339Nano
