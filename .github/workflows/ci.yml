name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff==0.8.4
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  test-backend:
    needs: [lint]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bpmn
          POSTGRES_PASSWORD: bpmn
          POSTGRES_DB: bpmn
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Used by `tests/test_migrations.py` for the alembic round-trip.
      TEST_PG_URL: "postgresql+asyncpg://bpmn:bpmn@localhost:5432/bpmn"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt
      - name: Run tests
        run: pytest backend/tests/ -v
        working-directory: ${{ github.workspace }}

  test-ml:
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r ml/requirements-dev.txt
      - name: Run tests
        run: pytest ml/tests/ -v

  test-ml-budget-pg:
    # Re-runs `test_budget.py` against a real Postgres 16 to catch any
    # dialect-specific bugs the SQLite-default test fixture would mask.
    # BudgetTracker uses `Session.begin()` + `with_for_update()` on PG —
    # this job is the only place that exercises that branch.
    needs: [lint]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bpmn
          POSTGRES_PASSWORD: bpmn
          POSTGRES_DB: bpmn
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r ml/requirements-dev.txt psycopg2-binary
      - name: Run budget tests against Postgres
        env:
          BUDGET_TEST_DB_URL: "postgresql+psycopg2://bpmn:bpmn@localhost:5432/bpmn"
        run: pytest ml/tests/test_budget.py -v

  test-frontend:
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Run tests
        run: npm test
        working-directory: frontend

  build-push:
    needs: [test-backend, test-ml, test-frontend]
    # Сборка только при push в main, не на pull request
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [frontend, backend, ml]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: registry.devfoundryteam.ru
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: registry.devfoundryteam.ru/bpmn-${{ matrix.service }}:latest
          cache-from: type=registry,ref=registry.devfoundryteam.ru/bpmn-${{ matrix.service }}:cache
          cache-to: type=registry,ref=registry.devfoundryteam.ru/bpmn-${{ matrix.service }}:cache,mode=max

  prepare-server:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate .env from .env.prod
        run: |
          # Both keys are provisioned so ops can flip LLM_BACKEND at any
          # time without redeploying. We only fail early on the key that
          # the *currently selected* backend actually needs.
          export GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"
          export POLZA_API_KEY="${{ secrets.POLZA_API_KEY }}"
          export POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"
          export INTERNAL_API_KEY="${{ secrets.INTERNAL_API_KEY }}"
          export CORS_ALLOWED_ORIGINS="${{ secrets.CORS_ALLOWED_ORIGINS }}"
          envsubst < .env.prod > .env

          # Sanity check — fail early if the secret needed by the
          # currently configured LLM_BACKEND is missing or empty.
          backend=$(grep -E "^LLM_BACKEND=" .env | cut -d= -f2 | tr -d '[:space:]')
          backend=${backend:-polza}
          if [ "$backend" = "gemini" ]; then
            if ! grep -qE "^GEMINI_API_KEY=AI[A-Za-z0-9_-]+$" .env; then
              echo "::error::GEMINI_API_KEY secret missing (LLM_BACKEND=gemini)."
              echo "::error::  Add the secret at: Settings → Secrets and variables → Actions"
              echo "::error::  Get a free key at: https://aistudio.google.com/apikey"
              exit 1
            fi
          elif [ "$backend" = "polza" ]; then
            if ! grep -qE "^POLZA_API_KEY=pza_[A-Za-z0-9_-]+$" .env; then
              echo "::error::POLZA_API_KEY secret missing (LLM_BACKEND=polza)."
              echo "::error::  Add the secret at: Settings → Secrets and variables → Actions"
              echo "::error::  Get a key from: https://polza.ai/dashboard"
              exit 1
            fi
          else
            echo "::error::Unknown LLM_BACKEND='$backend' in .env.prod (expected 'gemini' or 'polza')."
            exit 1
          fi
      - name: Copy .env, docker-compose.yml, and infra/ to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # `infra/` holds Loki/Promtail/Grafana provisioning that
          # docker-compose mounts read-only into the observability
          # containers. Without it those services fail to start.
          source: ".env,docker-compose.yml,infra"
          target: /opt/bpmn-project/
