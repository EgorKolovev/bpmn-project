name: Deploy

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy ('all' = full bring-up; 'clean-infra' = remove stale infra/ dirs created by failed mounts; otherwise per-service)"
        required: true
        type: choice
        options:
          - all
          - db
          - ml
          - backend
          - frontend
          - loki
          - promtail
          - grafana
          - clean-infra

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy ${{ inputs.service }} on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/bpmn-project

            # Логин в registry (нужен для pull образов backend/ml/frontend)
            echo "${{ secrets.REGISTRY_PASSWORD }}" | \
              docker login registry.devfoundryteam.ru \
              -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

            if [ "${{ inputs.service }}" = "all" ]; then
              # Full bring-up: picks up newly-added services (e.g.
              # Loki / Promtail / Grafana on first run after they were
              # added to docker-compose.yml).
              docker compose pull
              docker compose up -d --remove-orphans
              docker compose ps
            elif [ "${{ inputs.service }}" = "clean-infra" ]; then
              # Cleanup for the case where a previous deploy failed
              # because Docker auto-created mount source paths as
              # directories (e.g. infra/loki/config.yaml as a dir).
              # Stops the affected services, drops the bad dirs, and
              # exits — next "all" deploy will scp the real files.
              docker compose stop loki promtail grafana 2>/dev/null || true
              docker compose rm -f loki promtail grafana 2>/dev/null || true
              sudo rm -rf infra
              echo "infra/ cleaned. Re-run prepare-server (push any commit) then deploy 'all'."
            else
              # Per-service redeploy (no-deps avoids restarting db etc.)
              docker compose pull ${{ inputs.service }}
              docker compose up -d --no-deps ${{ inputs.service }}
              docker compose ps ${{ inputs.service }}
            fi
