name: Deploy

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy ('all' = full bring-up; 'verify' = check health endpoints + Loki ingestion; 'clean-infra' = remove stale mount-source dirs; otherwise per-service)"
        required: true
        type: choice
        options:
          - all
          - db
          - ml
          - backend
          - frontend
          - loki
          - promtail
          - grafana
          - clean-infra
          - verify

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy ${{ inputs.service }} on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/bpmn-project

            # Логин в registry (нужен для pull образов backend/ml/frontend)
            echo "${{ secrets.REGISTRY_PASSWORD }}" | \
              docker login registry.devfoundryteam.ru \
              -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

            if [ "${{ inputs.service }}" = "all" ]; then
              # Full bring-up: picks up newly-added services (e.g.
              # Loki / Promtail / Grafana on first run after they were
              # added to docker-compose.yml).
              docker compose pull
              docker compose up -d --remove-orphans
              docker compose ps
            elif [ "${{ inputs.service }}" = "clean-infra" ]; then
              # Cleanup for the case where a previous deploy failed
              # because Docker auto-created mount source paths as
              # directories (e.g. infra/loki/config.yaml as a dir).
              docker compose stop loki promtail grafana 2>/dev/null || true
              docker compose rm -f loki promtail grafana 2>/dev/null || true
              sudo rm -rf infra
              echo "infra/ cleaned. Re-run prepare-server (push any commit) then deploy 'all'."
            elif [ "${{ inputs.service }}" = "verify" ]; then
              # Smoke-test prod: check /health on backend + ml, then
              # confirm Loki is ingesting log streams from the app
              # services. Surfaces any boot-time alembic or LLM
              # backend mis-config before users notice.
              echo "=== docker compose ps ==="
              docker compose ps
              echo ""
              echo "=== backend /health (via frontend nginx) ==="
              docker compose exec -T backend python -c \
                'import urllib.request; print(urllib.request.urlopen("http://localhost:8000/health").read().decode())'
              echo ""
              echo "=== ml /health ==="
              docker compose exec -T ml python -c \
                'import urllib.request; print(urllib.request.urlopen("http://localhost:8001/health").read().decode())'
              echo ""
              echo "=== Loki labels (proves ingestion) ==="
              docker compose exec -T promtail wget -qO- http://loki:3100/loki/api/v1/labels
              echo ""
              echo "=== Backend recent log lines from Loki ==="
              docker compose exec -T promtail wget -qO- \
                "http://loki:3100/loki/api/v1/query_range?query=%7Bjob%3D%22bpmn-backend%22%7D&limit=3" \
                | head -c 600
              echo ""
              echo "=== Backend alembic startup state ==="
              docker compose logs backend 2>&1 | grep -E "entrypoint|alembic|Started server" | head -10
            else
              # Per-service redeploy (no-deps avoids restarting db etc.)
              docker compose pull ${{ inputs.service }}
              docker compose up -d --no-deps ${{ inputs.service }}
              docker compose ps ${{ inputs.service }}
            fi
